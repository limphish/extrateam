<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExtraTeam</title>

<style>
:root {
    --bg: #0a0a0a;
    --card: #111;
    --border: #222;
    --text: #fff;
    --gray: #aaa;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Inter, sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
}

/* CANVAS */
#stars {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

/* CONTAINER */
.container {
    max-width: 1200px;
    margin:auto;
    padding:40px 20px;
}

/* HEADER */
.header {
    text-align:center;
    padding:120px 20px;
}

h1 {
    font-size:3.5rem;
    letter-spacing:2px;
}

p {
    color:var(--gray);
}

/* BUTTON */
.btn {
    margin-top:20px;
    display:inline-block;
    padding:14px 30px;
    border:1px solid #fff;
    border-radius:50px;
    text-decoration:none;
    color:#fff;
    transition:.3s;
}

.btn:hover {
    background:#fff;
    color:#000;
}

/* CARDS */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
    margin-top:60px;
}

.card {
    background:var(--card);
    border:1px solid var(--border);
    padding:25px;
    border-radius:15px;
    transition:.3s;
}

.card:hover {
    transform:translateY(-5px);
    border-color:#555;
}

/* IMAGE BLOCK */
.image-box {
    margin-top:15px;
}

.image-box img {
    width:100%;
    border-radius:10px;
}

/* STATS */
.stats {
    margin-top:100px;
    text-align:center;
}

input[type=range] {
    width:100%;
    margin-top:20px;
}

canvas#chart {
    margin-top:30px;
}

/* SECTION TITLE */
h2 {
    margin-top:80px;
    text-align:center;
    font-size:2rem;
}

</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">

    <div class="header">
        <h1>EXTRA TEAM</h1>
        <p>Зарабатывай в цифровом пространстве</p>
        <a href="#" class="btn">Начать</a>
    </div>

    <h2>Наши направления</h2>

    <div class="grid">
        <div class="card">
            <h3>Трейдинг</h3>
            <p>Алгоритмы и автоматизация дохода</p>

            <div class="image-box">
                <img src="images/trade.jpg">
            </div>
        </div>

        <div class="card">
            <h3>Партнёрство</h3>
            <p>Зарабатывай на системе</p>

            <div class="image-box">
                <img src="images/partner.jpg">
            </div>
        </div>

        <div class="card">
            <h3>Онлайн услуги</h3>
            <p>Работа без ограничений</p>

            <div class="image-box">
                <img src="images/work.jpg">
            </div>
        </div>
    </div>

    <div class="stats">
        <h2>Твой заработок</h2>
        <p id="income">Доход: 50 000₽</p>

        <input type="range" min="10000" max="300000" value="50000" id="slider">

        <canvas id="chart" width="400" height="200"></canvas>
    </div>

</div>

<script>
/* STAR BACKGROUND */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:(Math.random()-0.5)*0.5,
        vy:(Math.random()-0.5)*0.5
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    stars.forEach(s=>{
        s.x+=s.vx;
        s.y+=s.vy;

        ctx.beginPath();
        ctx.arc(s.x,s.y,2,0,Math.PI*2);
        ctx.fillStyle="#fff";
        ctx.fill();
    });

    // линии
    for(let i=0;i<stars.length;i++){
        for(let j=i+1;j<stars.length;j++){
            let dx = stars[i].x - stars[j].x;
            let dy = stars[i].y - stars[j].y;
            let dist = Math.sqrt(dx*dx+dy*dy);

            if(dist < 120){
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                ctx.beginPath();
                ctx.moveTo(stars[i].x, stars[i].y);
                ctx.lineTo(stars[j].x, stars[j].y);
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(draw);
}

draw();

/* SLIDER + GRAPH */
const slider = document.getElementById("slider");
const income = document.getElementById("income");
const chart = document.getElementById("chart").getContext("2d");

function drawChart(val){
    chart.clearRect(0,0,400,200);

    chart.beginPath();
    chart.moveTo(0,200);

    for(let i=0;i<400;i++){
        let y = 200 - (Math.sin(i/50)*val/2000 + val/3000);
        chart.lineTo(i,y);
    }

    chart.strokeStyle="#fff";
    chart.stroke();
}

slider.oninput = () => {
    income.innerText = "Доход: " + slider.value + "₽";
    drawChart(slider.value);
}

drawChart(50000);
</script>

</body>
</html>
